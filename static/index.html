<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>License 管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
.login-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 360px; }
.login-box h2 { text-align: center; margin-bottom: 24px; color: #1a1a1a; }
.container { max-width: 960px; margin: 0 auto; padding: 24px; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
header h1 { font-size: 22px; color: #1a1a1a; }
.btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: opacity 0.2s; }
.btn:hover { opacity: 0.85; }
.btn-primary { background: #4f46e5; color: #fff; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-secondary { background: #6b7280; color: #fff; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
input, select { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,0.15); }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
th, td { padding: 12px 14px; text-align: left; font-size: 13px; }
th { background: #f9fafb; font-weight: 600; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
td { border-bottom: 1px solid #f3f4f6; }
tr:last-child td { border-bottom: none; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; z-index: 100; }
.modal { background: #fff; padding: 28px; border-radius: 12px; width: 420px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
.modal h3 { margin-bottom: 18px; font-size: 18px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
.tag { display: inline-block; background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin: 1px 2px; }
.tag-permanent { background: #d1fae5; color: #065f46; }
.tag-expired { background: #fee2e2; color: #991b1b; }
.empty { text-align: center; padding: 40px; color: #9ca3af; }
#app { display: none; }
</style>
</head>
<body>

<div id="loginPage" class="login-wrap">
  <div class="login-box">
    <h2>License 管理</h2>
    <input type="password" id="tokenInput" placeholder="输入 Admin Token">
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">登录</button>
    <p id="loginError" style="color:#ef4444;text-align:center;margin-top:12px;font-size:13px"></p>
  </div>
</div>

<div id="app">
  <div class="container">
    <header>
      <h1>License 授权管理</h1>
      <div>
        <button class="btn btn-primary" onclick="showCreateModal()">新增授权</button>
        <button class="btn btn-secondary" style="margin-left:8px" onclick="doLogout()">退出</button>
      </div>
    </header>
    <div id="tableWrap"></div>
  </div>
</div>

<div id="modalWrap"></div>

<script>
let token = localStorage.getItem('admin_token') || '';

function api(method, path, body) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  return fetch(path, opts).then(r => r.json().then(d => ({ ok: r.ok, data: d })));
}

function doLogin() {
  token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  localStorage.setItem('admin_token', token);
  api('GET', '/api/license/list').then(r => {
    if (!r.ok) { document.getElementById('loginError').textContent = '认证失败'; localStorage.removeItem('admin_token'); return; }
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderTable(r.data);
  });
}

function doLogout() {
  localStorage.removeItem('admin_token');
  token = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('tokenInput').value = '';
}

function loadList() {
  api('GET', '/api/license/list').then(r => { if (r.ok) renderTable(r.data); });
}

function renderTable(list) {
  if (!list.length) { document.getElementById('tableWrap').innerHTML = '<div class="empty">暂无授权记录</div>'; return; }
  let html = '<table><thead><tr><th>License ID</th><th>授权 IP</th><th>签发时间</th><th>过期时间</th><th>操作</th></tr></thead><tbody>';
  list.forEach(l => {
    const ips = l.allowed_ips.map(ip => '<span class="tag">' + ip + '</span>').join(' ');
    let exp = '<span class="tag tag-permanent">永久</span>';
    if (l.expires_at) {
      const d = new Date(l.expires_at);
      exp = d < new Date() ? '<span class="tag tag-expired">已过期 ' + l.expires_at + '</span>' : l.expires_at;
    }
    html += '<tr><td style="font-family:monospace;font-size:12px">' + l.license_id + '</td><td>' + ips + '</td><td>' + l.issued_at + '</td><td>' + exp + '</td>';
    html += '<td><button class="btn btn-primary btn-sm" onclick="showEditModal(\'' + l.license_id + '\',\'' + l.allowed_ips.join(',') + '\',\'' + (l.expires_at||'') + '\')">编辑</button> ';
    html += '<button class="btn btn-danger btn-sm" onclick="doRevoke(\'' + l.license_id + '\')">吊销</button></td></tr>';
  });
  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

function closeModal() { document.getElementById('modalWrap').innerHTML = ''; }

function showCreateModal() {
  document.getElementById('modalWrap').innerHTML = '<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal"><h3>新增授权</h3>' +
    '<label style="font-size:13px;color:#6b7280">IP 地址（多个用逗号分隔）</label><input id="mIPs" placeholder="1.2.3.4, 5.6.7.8">' +
    '<label style="font-size:13px;color:#6b7280">过期时间（留空为永久）</label><input id="mExp" type="datetime-local">' +
    '<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doCreate()">创建</button></div></div></div>';
}

function doCreate() {
  const ips = document.getElementById('mIPs').value.split(',').map(s => s.trim()).filter(Boolean);
  const exp = document.getElementById('mExp').value;
  if (!ips.length) return alert('请输入至少一个 IP');
  const body = { allowed_ips: ips, expires_at: exp ? new Date(exp).toISOString() : null };
  api('POST', '/api/license/create', body).then(r => { if (r.ok) { closeModal(); loadList(); } else alert(r.data.error); });
}

function showEditModal(id, ips, exp) {
  const expVal = exp ? exp.slice(0, 16) : '';
  document.getElementById('modalWrap').innerHTML = '<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal"><h3>编辑授权</h3>' +
    '<label style="font-size:13px;color:#6b7280">IP 地址（多个用逗号分隔）</label><input id="mIPs" value="' + ips + '">' +
    '<label style="font-size:13px;color:#6b7280">过期时间（留空为永久）</label><input id="mExp" type="datetime-local" value="' + expVal + '">' +
    '<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doUpdate(\'' + id + '\')">保存</button></div></div></div>';
}

function doUpdate(id) {
  const ips = document.getElementById('mIPs').value.split(',').map(s => s.trim()).filter(Boolean);
  const exp = document.getElementById('mExp').value;
  if (!ips.length) return alert('请输入至少一个 IP');
  const body = { license_id: id, allowed_ips: ips, expires_at: exp ? new Date(exp).toISOString() : null };
  api('POST', '/api/license/update', body).then(r => { if (r.ok) { closeModal(); loadList(); } else alert(r.data.error); });
}

function doRevoke(id) {
  if (!confirm('确定要吊销此授权？')) return;
  api('POST', '/api/license/revoke', { license_id: id }).then(r => { if (r.ok) loadList(); else alert(r.data.error); });
}

if (token) {
  api('GET', '/api/license/list').then(r => {
    if (r.ok) { document.getElementById('loginPage').style.display = 'none'; document.getElementById('app').style.display = 'block'; renderTable(r.data); }
    else { localStorage.removeItem('admin_token'); token = ''; }
  });
}
document.getElementById('tokenInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
